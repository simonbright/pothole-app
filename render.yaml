# Two services: static site (instant CDN) + API (photo upload/review only).
#
# Render cannot convert an existing Web Service into a Static Site via Blueprint sync.
# If sync fails with "changing service type not supported":
#   1. Dashboard → delete the old "pothole-app" Web Service
#   2. Blueprint → Manual sync
# Main app URL: https://pothole-web.onrender.com
services:
  - type: web
    name: pothole-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: API_ONLY
        value: "true"
      - key: SUPABASE_URL
        value: https://cfhuqcpojontkwhpkzyn.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PHOTO_REVIEW_SECRET
        sync: false

  - type: web
    name: pothole-web
    runtime: static
    buildCommand: npm run build:static
    staticPublishPath: ./_site
    routes:
      - type: redirect
        source: /favicon.ico
        destination: /favicon.svg
      - type: rewrite
        source: /api/*
        destination: https://pothole-api.onrender.com/api/*
      - type: rewrite
        source: /.netlify/functions/*
        destination: https://pothole-api.onrender.com/.netlify/functions/*
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
